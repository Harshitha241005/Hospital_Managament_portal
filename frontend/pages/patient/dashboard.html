<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard — MediCare HMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .page-section { display:none; }
    .page-section.active { display:block; }
    .stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
    .stat-mini { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
    .stat-mini h3 { font-size:1.8rem; color:var(--primary); margin-bottom:2px; }
    .stat-mini p { font-size:.78rem; color:var(--text2); }
    .apt-card { border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; background:#fff; }
    .apt-card:hover { box-shadow:var(--shadow2); }
    .status-badge { padding:4px 12px; border-radius:999px; font-size:.78rem; font-weight:600; display:inline-block; }
    .badge-pending   { background:#fff3cd; color:#856404; }
    .badge-confirmed { background:#d1ecf1; color:#0c5460; }
    .badge-completed { background:#d4edda; color:#155724; }
    .badge-cancelled { background:#f8d7da; color:#721c24; }
    .flex-between { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    .mini-muted { color:var(--text2); font-size:.83rem; }
    .input-field { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:.9rem; font-family:'DM Sans',sans-serif; }
    .booking-steps { display:flex; gap:0; margin-bottom:24px; }
    .step { flex:1; text-align:center; padding:10px; font-size:.82rem; color:var(--text2); border-bottom:3px solid var(--border); transition:.2s; }
    .step.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
    .step.done { color:var(--success); border-bottom-color:var(--success); }
    .doctor-select-card { border:2px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:.2s; margin-bottom:10px; }
    .doctor-select-card:hover { border-color:var(--accent); }
    .doctor-select-card.selected { border-color:var(--primary); background:#eef4ff; }
    .slot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; margin-top:12px; }
    .slot-btn { padding:10px; border:2px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:.85rem; transition:.2s; background:#fff; }
    .slot-btn:hover { border-color:var(--accent); }
    .slot-btn.selected { border-color:var(--primary); background:#eef4ff; color:var(--primary); font-weight:600; }
    .presc-card { border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; background:#fff; }
    .invoice-box { background:#fff; border-radius:12px; padding:24px; border:1px solid var(--border); }
    .invoice-table { width:100%; border-collapse:collapse; margin-top:12px; }
    .invoice-table th,.invoice-table td { border:1px solid #ddd; padding:8px 12px; text-align:left; font-size:.88rem; }
    .invoice-table th { background:#f5f5f5; font-weight:600; }
    .totals-box { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:16px; }
    .totals-box p { display:flex; justify-content:space-between; margin-bottom:6px; font-size:.9rem; }
    .totals-box .grand { font-weight:700; font-size:1.1rem; border-top:2px solid var(--primary); padding-top:8px; margin-top:8px; }
    .info-row { display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .info-row label { width:130px; font-weight:600; font-size:.85rem; color:var(--text2); flex-shrink:0; }
    .btn-xs { padding:6px 14px; font-size:.8rem; border-radius:6px; width:auto; }
    .spec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-bottom:16px; }
    .spec-card { border:2px solid var(--border); border-radius:10px; padding:14px 10px; text-align:center; cursor:pointer; transition:.2s; background:#fff; }
    .spec-card:hover { border-color:var(--accent); }
    .spec-card.selected { border-color:var(--primary); background:#eef4ff; }
    .spec-card .spec-icon { font-size:1.6rem; margin-bottom:6px; }
    .spec-card .spec-name { font-size:.82rem; font-weight:600; color:var(--text); }
    .bill-card { border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; background:#fff; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:.75rem; font-weight:600; }
    .pill-green { background:#d4edda; color:#155724; }
    .pill-red { background:#f8d7da; color:#721c24; }
    .pill-yellow { background:#fff3cd; color:#856404; }
  </style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🏥 MediCare</h2><p>Patient Portal</p></div>
    <div class="sidebar-user">
      <div class="avatar" id="user-avatar">P</div>
      <div class="info">
        <div class="name" id="user-name">Patient</div>
        <div class="role">Patient</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">🏠 Dashboard</div>
      <div class="nav-item" data-page="appointments" onclick="navigate('appointments')">📅 My Appointments</div>
      <div class="nav-item" data-page="book" onclick="navigate('book')">➕ Book Appointment</div>
      <div class="nav-section">Health Records</div>
      <div class="nav-item" data-page="prescriptions" onclick="navigate('prescriptions')">💊 Prescriptions</div>
      <div class="nav-item" data-page="reports" onclick="navigate('reports')">🧪 My Reports</div>
      <div class="nav-item" data-page="billing" onclick="navigate('billing')">💰 Billing</div>
      <div class="nav-section">Account</div>
      <div class="nav-item" data-page="profile" onclick="navigate('profile')">👤 My Profile</div>
    </nav>
    <div class="sidebar-footer">
      <div class="logout-btn" onclick="Auth.logout()">🚪 <span>Logout</span></div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <div style="font-size:.88rem;color:var(--text2);">Welcome, <strong id="topbar-name"></strong></div>
      </div>
    </div>
    <div class="page-content">
      <div id="sec-dashboard"     class="page-section active"></div>
      <div id="sec-appointments"  class="page-section"></div>
      <div id="sec-book"          class="page-section"></div>
      <div id="sec-prescriptions" class="page-section"></div>
      <div id="sec-reports"       class="page-section"></div>
      <div id="sec-billing"       class="page-section"></div>
      <div id="sec-profile"       class="page-section"></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let patUser, allApts = [], allBills = [], allPrescs = [];

// Booking state
let bookStep = 1, selectedSpeciality = '', selectedDoctor = null, selectedSlot = '', selectedDate = '';

document.addEventListener('DOMContentLoaded', async () => {
  patUser = await Auth.requireAuth('patient');
  if (!patUser) return;
  document.getElementById('user-name').textContent = patUser.name || 'Patient';
  document.getElementById('user-avatar').textContent = (patUser.name || 'P').charAt(0).toUpperCase();
  document.getElementById('topbar-name').textContent = (patUser.name || '').split(' ')[0];
  navigate('dashboard');
});

function navigate(page) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('sec-' + page);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  const titles = { dashboard:'Dashboard', appointments:'My Appointments', book:'Book Appointment', prescriptions:'Prescriptions', reports:'My Reports', billing:'Billing & Payments', profile:'My Profile' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const loaders = { dashboard:loadDashboard, appointments:loadAppointments, book:loadBook, prescriptions:loadPrescriptions, reports:loadReports, billing:loadBilling, profile:loadProfile };
  if (loaders[page]) loaders[page]();
}

function statusBadge(s) {
  const map = { pending:'badge-pending', confirmed:'badge-confirmed', completed:'badge-completed', cancelled:'badge-cancelled' };
  return `<span class="status-badge ${map[s]||'badge-pending'}">${s||'pending'}</span>`;
}

function statusPill(s) {
  const map = { paid:'pill-green', unpaid:'pill-red', partially_paid:'pill-yellow' };
  return `<span class="pill ${map[s]||'pill-red'}">${s||'unpaid'}</span>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────
async function loadDashboard() {
  const sec = document.getElementById('sec-dashboard');
  sec.innerHTML = '<p>Loading...</p>';
  try {
    const [aptsRes, billsRes, prescsRes] = await Promise.allSettled([
      API.patient.appointments(), API.patient.bills(), API.patient.prescriptions()
    ]);

    const apts   = aptsRes.status==='fulfilled'   ? getData(aptsRes.value)   : [];
    const bills  = billsRes.status==='fulfilled'  ? getData(billsRes.value)  : [];
    const prescs = prescsRes.status==='fulfilled' ? getData(prescsRes.value) : [];

    allApts = apts; allBills = bills; allPrescs = prescs;

    const upcoming = apts.filter(a => a.status === 'confirmed' || a.status === 'pending');
    const unpaidBills = bills.filter(b => b.status !== 'paid');

    sec.innerHTML = `
      <div class="stat-row">
        <div class="stat-mini"><h3>${apts.length}</h3><p>Appointments</p></div>
        <div class="stat-mini"><h3>${upcoming.length}</h3><p>Upcoming</p></div>
        <div class="stat-mini"><h3>${prescs.length}</h3><p>Prescriptions</p></div>
        <div class="stat-mini"><h3>${bills.length}</h3><p>Bills</p></div>
      </div>

      ${unpaidBills.length ? `
        <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
          <span>⚠️ You have <strong>${unpaidBills.length}</strong> unpaid bill(s).</span>
          <button class="btn btn-warning btn-xs" onclick="navigate('billing')">View Bills</button>
        </div>
      ` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card">
          <div class="card-header flex-between">
            <h3>Recent Appointments</h3>
            <button class="btn btn-primary btn-xs" onclick="navigate('book')">+ Book</button>
          </div>
          <div class="card-body">
            ${apts.slice(0,4).map(a => `
              <div class="apt-card" style="padding:12px;">
                <div class="flex-between">
                  <div>
                    <strong>${a.speciality||''}</strong>
                    <div class="mini-muted">Dr. ${a.doctor?.name||'N/A'}</div>
                    <div class="mini-muted">${a.date||''} · ${a.time||''}</div>
                  </div>
                  ${statusBadge(a.status)}
                </div>
              </div>
            `).join('') || '<p class="mini-muted">No appointments yet. <a href="#" onclick="navigate(\'book\')">Book one!</a></p>'}
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3>Latest Prescriptions</h3></div>
          <div class="card-body">
            ${prescs.slice(0,3).map(p => `
              <div class="presc-card" style="padding:12px;">
                <strong>${p.diagnosis||'Prescription'}</strong>
                <div class="mini-muted">Dr. ${p.doctor?.name||'N/A'}</div>
                <div class="mini-muted">${(p.medicines||[]).length} medicine(s)</div>
              </div>
            `).join('') || '<p class="mini-muted">No prescriptions yet.</p>'}
          </div>
        </div>
      </div>
    `;
  } catch(e) { sec.innerHTML = `<div style="color:red;">${e.message}</div>`; }
}

function getData(res) {
  if (Array.isArray(res)) return res;
  if (res?.data && Array.isArray(res.data)) return res.data;
  return [];
}

// ── APPOINTMENTS ──────────────────────────────────────────────────
async function loadAppointments() {
  const sec = document.getElementById('sec-appointments');
  sec.innerHTML = '<p>Loading...</p>';
  try {
    const res = await API.patient.appointments();
    allApts = getData(res);
    sec.innerHTML = `
      <div class="card">
        <div class="card-header flex-between">
          <h3>My Appointments (${allApts.length})</h3>
          <button class="btn btn-primary btn-xs" onclick="navigate('book')">+ Book New</button>
        </div>
        <div class="card-body">
          ${allApts.length ? allApts.map(a => `
            <div class="apt-card">
              <div class="flex-between">
                <div>
                  <strong>${a.speciality||''}</strong>
                  <div class="mini-muted">Dr. ${a.doctor?.name||'N/A'} · ${a.doctor?.speciality||''}</div>
                  <div class="mini-muted">📅 ${a.date||''} at ${a.time||''}</div>
                  <div class="mini-muted">Condition: ${a.condition||'General'}</div>
                  ${a.notes ? `<div class="mini-muted">📝 ${a.notes}</div>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                  ${statusBadge(a.status)}
                  ${(a.status==='pending' || a.status==='confirmed') ? `
                    <button class="btn btn-danger btn-xs" onclick="cancelApt('${a._id}')">Cancel</button>
                  ` : ''}
                </div>
              </div>
            </div>
          `).join('') : '<p class="mini-muted" style="text-align:center;padding:20px;">No appointments. <a href="#" onclick="navigate(\'book\')">Book your first!</a></p>'}
        </div>
      </div>
    `;
  } catch(e) { sec.innerHTML = `<div style="color:red;">${e.message}</div>`; }
}

async function cancelApt(id) {
  if (!confirm('Cancel this appointment?')) return;
  try {
    await API.appointments.updateStatus(id, { status: 'cancelled' });
    await loadAppointments();
    await loadDashboard();
  } catch(e) { alert(e.message); }
}

// ── BOOK APPOINTMENT ──────────────────────────────────────────────
const specialities = [
  { name:'Cardiology', icon:'❤️' }, { name:'Neurology', icon:'🧠' },
  { name:'Orthopedics', icon:'🦴' }, { name:'Dermatology', icon:'🩺' },
  { name:'Gynecology', icon:'👩‍⚕️' }, { name:'Pediatrics', icon:'👶' },
  { name:'General Medicine', icon:'💊' }, { name:'Gastroenterology', icon:'🔬' },
  { name:'Pulmonology', icon:'🫁' }, { name:'Endocrinology', icon:'⚗️' },
  { name:'Ophthalmology', icon:'👁️' }, { name:'ENT', icon:'👂' },
  { name:'Psychiatry', icon:'🧘' }, { name:'Urology', icon:'🏥' }
];

function loadBook() {
  bookStep = 1; selectedSpeciality = ''; selectedDoctor = null; selectedSlot = ''; selectedDate = '';
  renderBooking();
}

function renderBooking() {
  const sec = document.getElementById('sec-book');
  sec.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Book an Appointment</h3></div>
      <div class="card-body">
        <div class="booking-steps">
          <div class="step ${bookStep>=1?'active':''} ${bookStep>1?'done':''}">1. Choose Speciality</div>
          <div class="step ${bookStep>=2?'active':''} ${bookStep>2?'done':''}">2. Select Doctor</div>
          <div class="step ${bookStep>=3?'active':''} ${bookStep>3?'done':''}">3. Pick Date & Slot</div>
          <div class="step ${bookStep>=4?'active':''}">4. Confirm</div>
        </div>
        <div id="book-step-content"></div>
      </div>
    </div>
  `;
  renderBookStep();
}

function renderBookStep() {
  const el = document.getElementById('book-step-content');
  if (!el) return;
  if (bookStep === 1) renderStep1(el);
  else if (bookStep === 2) renderStep2(el);
  else if (bookStep === 3) renderStep3(el);
  else if (bookStep === 4) renderStep4(el);
}

function renderStep1(el) {
  el.innerHTML = `
    <h4 style="margin-bottom:14px;">Choose a Speciality</h4>
    <div class="spec-grid">
      ${specialities.map(s => `
        <div class="spec-card ${selectedSpeciality===s.name?'selected':''}" onclick="pickSpeciality('${s.name}')">
          <div class="spec-icon">${s.icon}</div>
          <div class="spec-name">${s.name}</div>
        </div>
      `).join('')}
    </div>
    ${selectedSpeciality ? `
      <div style="margin-top:16px;display:flex;justify-content:flex-end;">
        <button class="btn btn-primary btn-xs" onclick="bookStep=2;renderBooking()">Next: Select Doctor →</button>
      </div>
    ` : ''}
  `;
}

function pickSpeciality(name) {
  selectedSpeciality = name;
  renderBookStep();
}

async function renderStep2(el) {
  el.innerHTML = '<p>Loading doctors...</p>';
  try {
    const res = await API.users.doctors({ speciality: selectedSpeciality, available: 'true' });
    const doctors = res.data || [];
    el.innerHTML = `
      <div class="flex-between" style="margin-bottom:14px;">
        <h4>Available Doctors — ${selectedSpeciality}</h4>
        <button class="btn btn-secondary btn-xs" onclick="bookStep=1;renderBooking()">← Back</button>
      </div>
      ${doctors.length ? doctors.map(d => `
        <div class="doctor-select-card ${selectedDoctor?._id===d._id?'selected':''}" onclick="pickDoctor(${JSON.stringify(d).replace(/"/g,'&quot;')})">
          <div class="flex-between">
            <div>
              <strong>Dr. ${d.name}</strong>
              <div class="mini-muted">${d.speciality||''} · ${d.experience ? d.experience+' yrs exp' : ''}</div>
              ${d.hospital ? `<div class="mini-muted">🏥 ${d.hospital}</div>` : ''}
              ${d.rating ? `<div class="mini-muted">⭐ ${d.rating}/5</div>` : ''}
            </div>
            <div style="text-align:right;">
              ${d.available ? '<span class="pill pill-green">Available</span>' : '<span class="pill pill-red">Unavailable</span>'}
              <div class="mini-muted" style="margin-top:4px;">${(d.slots||[]).length} slots</div>
            </div>
          </div>
        </div>
      `).join('') : `<p class="mini-muted" style="text-align:center;padding:20px;">No available doctors for ${selectedSpeciality}.</p>`}
      ${selectedDoctor ? `
        <div style="margin-top:16px;display:flex;justify-content:flex-end;">
          <button class="btn btn-primary btn-xs" onclick="bookStep=3;renderBooking()">Next: Pick Date & Slot →</button>
        </div>
      ` : ''}
    `;
  } catch(e) { el.innerHTML = `<p style="color:red;">${e.message}</p>`; }
}

function pickDoctor(doc) {
  selectedDoctor = doc;
  renderStep2(document.getElementById('book-step-content'));
}

function renderStep3(el) {
  const today = new Date().toISOString().split('T')[0];
  el.innerHTML = `
    <div class="flex-between" style="margin-bottom:14px;">
      <h4>Choose Date & Time Slot</h4>
      <button class="btn btn-secondary btn-xs" onclick="bookStep=2;renderBooking()">← Back</button>
    </div>
    <div style="background:#f0f4f8;border-radius:8px;padding:12px;margin-bottom:16px;">
      <strong>Dr. ${selectedDoctor?.name||''}</strong> · ${selectedDoctor?.speciality||''}<br>
      ${selectedDoctor?.hospital ? `<span class="mini-muted">🏥 ${selectedDoctor.hospital}</span>` : ''}
    </div>

    <div class="form-group">
      <label>Select Date *</label>
      <input type="date" class="input-field" id="book-date" min="${today}" value="${selectedDate}" onchange="selectedDate=this.value;renderSlots()">
    </div>

    <div id="slots-section"></div>

    ${selectedDate && selectedSlot ? `
      <div style="margin-top:20px;display:flex;justify-content:flex-end;">
        <button class="btn btn-primary btn-xs" onclick="bookStep=4;renderBooking()">Next: Confirm →</button>
      </div>
    ` : ''}
  `;
  if (selectedDate) renderSlots();
}

function renderSlots() {
  const slots = selectedDoctor?.slots || [];
  selectedSlot = '';
  const el = document.getElementById('slots-section');
  if (!el) return;
  el.innerHTML = `
    <label style="font-weight:600;font-size:.85rem;color:var(--text2);display:block;margin-bottom:8px;">Available Time Slots</label>
    ${slots.length ? `
      <div class="slot-grid">
        ${slots.map(s => `<div class="slot-btn" onclick="pickSlot('${s}', this)">${s}</div>`).join('')}
      </div>
    ` : '<p class="mini-muted">No slots available for this doctor.</p>'}
  `;
}

function pickSlot(slot, el) {
  selectedSlot = slot;
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  // Show next button
  const step3 = document.getElementById('book-step-content');
  const existing = step3.querySelector('.step3-next');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'step3-next';
  div.style.cssText = 'margin-top:20px;display:flex;justify-content:flex-end;';
  div.innerHTML = `<button class="btn btn-primary btn-xs" onclick="bookStep=4;renderBooking()">Next: Confirm →</button>`;
  step3.appendChild(div);
}

function renderStep4(el) {
  el.innerHTML = `
    <div class="flex-between" style="margin-bottom:14px;">
      <h4>Confirm Appointment</h4>
      <button class="btn btn-secondary btn-xs" onclick="bookStep=3;renderBooking()">← Back</button>
    </div>

    <div style="background:#f0f4f8;border-radius:10px;padding:20px;margin-bottom:20px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><div class="mini-muted">Speciality</div><strong>${selectedSpeciality}</strong></div>
        <div><div class="mini-muted">Doctor</div><strong>Dr. ${selectedDoctor?.name||''}</strong></div>
        <div><div class="mini-muted">Date</div><strong>${selectedDate}</strong></div>
        <div><div class="mini-muted">Time</div><strong>${selectedSlot}</strong></div>
      </div>
    </div>

    <div class="form-group">
      <label>Your Condition / Reason for Visit</label>
      <input class="input-field" id="book-condition" placeholder="Briefly describe your condition or reason for visiting">
    </div>

    <div id="book-error" style="color:red;font-size:.85rem;margin-top:8px;"></div>

    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn btn-primary btn-xs" onclick="confirmBooking()">✓ Confirm Booking</button>
      <button class="btn btn-secondary btn-xs" onclick="bookStep=1;loadBook()">Start Over</button>
    </div>
  `;
}

async function confirmBooking() {
  const errEl = document.getElementById('book-error');
  if (!selectedDoctor || !selectedDate || !selectedSlot) {
    errEl.textContent = 'Please complete all steps before confirming.';
    return;
  }
  const condition = document.getElementById('book-condition')?.value.trim() || 'General consultation';

  try {
    await API.appointments.create({
      doctor: selectedDoctor._id,
      date: selectedDate,
      time: selectedSlot,
      speciality: selectedSpeciality,
      condition
    });

    const sec = document.getElementById('sec-book');
    sec.innerHTML = `
      <div class="card">
        <div class="card-body" style="text-align:center;padding:40px;">
          <div style="font-size:3rem;margin-bottom:12px;">✅</div>
          <h2 style="color:var(--primary);margin-bottom:8px;">Appointment Booked!</h2>
          <p class="mini-muted">Dr. ${selectedDoctor?.name||''} · ${selectedDate} at ${selectedSlot}</p>
          <p class="mini-muted" style="margin-top:8px;">You'll receive confirmation shortly.</p>
          <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;">
            <button class="btn btn-primary btn-xs" onclick="navigate('appointments')">View My Appointments</button>
            <button class="btn btn-secondary btn-xs" onclick="loadBook()">Book Another</button>
          </div>
        </div>
      </div>
    `;

    // Reset booking state
    bookStep = 1; selectedSpeciality = ''; selectedDoctor = null; selectedSlot = ''; selectedDate = '';
  } catch(e) {
    errEl.textContent = e.message || 'Booking failed. Please try again.';
  }
}

// ── BILLING ───────────────────────────────────────────────────────
async function loadBilling() {
  const sec = document.getElementById('sec-billing');
  sec.innerHTML = '<p>Loading...</p>';
  try {
    const res = await API.patient.bills();
    allBills = getData(res);
    renderBillingList();
  } catch(e) { sec.innerHTML = `<div style="color:red;">${e.message}</div>`; }
}

function renderBillingList() {
  const sec = document.getElementById('sec-billing');
  const total = allBills.reduce((s,b) => s+(b.grandTotal||0), 0);
  const paid = allBills.filter(b=>b.status==='paid').reduce((s,b) => s+(b.grandTotal||0), 0);
  const due = total - paid;

  sec.innerHTML = `
    <div class="stat-row">
      <div class="stat-mini"><h3>${allBills.length}</h3><p>Total Bills</p></div>
      <div class="stat-mini"><h3>₹${total.toLocaleString()}</h3><p>Total Amount</p></div>
      <div class="stat-mini"><h3 style="color:var(--success);">₹${paid.toLocaleString()}</h3><p>Paid</p></div>
      <div class="stat-mini"><h3 style="color:var(--danger);">₹${due.toLocaleString()}</h3><p>Due</p></div>
    </div>

    <div class="card">
      <div class="card-header"><h3>My Bills</h3></div>
      <div class="card-body">
        ${allBills.length ? allBills.map(b => `
          <div class="bill-card">
            <div class="flex-between">
              <div>
                <strong>${b.billNo||'Bill'}</strong>
                <div class="mini-muted">Dr. ${b.doctor?.name||'N/A'}</div>
                <div class="mini-muted">📅 ${b.createdAt ? new Date(b.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '-'}</div>
                <div style="margin-top:4px;font-size:1rem;"><strong>₹${(b.grandTotal||0).toLocaleString()}</strong></div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
                ${statusPill(b.status||'unpaid')}
                <div style="display:flex;gap:6px;">
                  <button class="btn btn-primary btn-xs" onclick="viewBill('${b._id}')">View</button>
                  <button class="btn btn-secondary btn-xs" onclick="downloadBillPDF('${b._id}')">⬇ PDF</button>
                </div>
              </div>
            </div>
          </div>
        `).join('') : '<p class="mini-muted" style="text-align:center;padding:20px;">No bills found.</p>'}
      </div>
    </div>
  `;
}

async function downloadBillPDF(id) {

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;background:#f8f8f8;padding:12px;border-radius:8px;">
      <div>
        <p style="font-size:10px;color:#999;margin-bottom:4px;font-weight:bold;">BILL TO</p>
        <p style="margin:2px 0;"><strong>${b.patient?.name||''}</strong></p>
        <p style="margin:2px 0;font-size:12px;color:#666;">${b.patient?.phone||''}</p>
        <p style="margin:2px 0;font-size:12px;color:#666;">${b.patient?.address||''}</p>
      </div>
      <div>
        <p style="font-size:10px;color:#999;margin-bottom:4px;font-weight:bold;">TREATING DOCTOR</p>
        <p style="margin:2px 0;"><strong>Dr. ${b.doctor?.name||''}</strong></p>
        <p style="margin:2px 0;font-size:12px;color:#666;">${b.doctor?.speciality||''}</p>
      </div>

    <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
      <thead>
        <tr style="background:#0a3d62;color:white;">
          <th style="padding:8px 10px;text-align:left;">#</th>
          <th style="padding:8px 10px;text-align:left;">Medicine</th>
          <th style="padding:8px 10px;text-align:left;">Dosage</th>
          <th style="padding:8px 10px;text-align:center;">Qty</th>
          <th style="padding:8px 10px;text-align:right;">Unit Price</th>
          <th style="padding:8px 10px;text-align:right;">Amount</th>
        </tr>
      </thead>
      <tbody>
        ${(b.items||[]).map((i,idx) => `<tr style="background:${idx%2===0?'#fff':'#f9f9f9'};">
          <td style="padding:7px 10px;border-bottom:1px solid #eee;">${idx+1}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;">${i.name||''}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;">${i.dosage||'-'}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;text-align:center;">${i.quantity||1}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;text-align:right;">₹${(i.unitPrice||0).toFixed(2)}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;text-align:right;">₹${(i.amount||0).toFixed(2)}</td>

        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Consultation Fee:</span><span>₹${(b.consultationFee||0).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Lab Fee:</span><span>₹${(b.labFee||0).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Subtotal:</span><span>₹${(b.subtotal||0).toFixed(2)}</span></div>

  await new Promise(r => setTimeout(r, 300));

  const opt = {
    margin: [10,10,10,10],
    filename: `${b.billNo||'Invoice'}.pdf`,
    image: { type:'jpeg', quality:1 },
    html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff' },
    jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
  };
  await html2pdf().set(opt).from(el).save();
  document.body.removeChild(el);

// ── PROFILE ───────────────────────────────────────────────────────
async function loadProfile() {
  const sec = document.getElementById('sec-profile');
  sec.innerHTML = '<p>Loading...</p>';
  try {
    const res = await API.auth.me();
    const u = res.user || {};

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card">
          <div class="card-header flex-between">
            <h3>My Profile</h3>
            <button class="btn btn-primary btn-xs" onclick="toggleEditMode()">✏️ Edit Profile</button>
          </div>
          <div class="card-body" id="profile-view">
            <div class="info-row"><label>Name</label><span>${u.name||'-'}</span></div>
            <div class="info-row"><label>Email</label><span>${u.email||'-'}</span></div>
            <div class="info-row"><label>Phone</label><span>${u.phone||'-'}</span></div>
            <div class="info-row"><label>Age</label><span>${u.age||'-'}</span></div>
            <div class="info-row"><label>Gender</label><span>${u.gender||'-'}</span></div>
            <div class="info-row"><label>Blood Group</label><span>${u.bloodGroup||'-'}</span></div>
            <div class="info-row"><label>Address</label><span>${u.address||'-'}</span></div>
          </div>
          <div class="card-body" id="profile-edit" style="display:none;">
            <div class="form-group"><label>Full Name</label><input class="input-field" id="ep-name" value="${u.name||''}"></div>
            <div class="form-group"><label>Phone</label><input class="input-field" id="ep-phone" value="${u.phone||''}"></div>
            <div class="form-group"><label>Age</label><input class="input-field" type="number" id="ep-age" value="${u.age||''}"></div>
            <div class="form-group"><label>Gender</label>
              <select class="input-field" id="ep-gender">
                <option value="">Select</option>
                <option ${u.gender==='Male'?'selected':''}>Male</option>
                <option ${u.gender==='Female'?'selected':''}>Female</option>
                <option ${u.gender==='Other'?'selected':''}>Other</option>
              </select>
            </div>
            <div class="form-group"><label>Blood Group</label>
              <select class="input-field" id="ep-blood">
                <option value="">Select</option>
                ${['A+','A-','B+','B-','O+','O-','AB+','AB-'].map(bg => `<option ${u.bloodGroup===bg?'selected':''}>${bg}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label>Address</label><textarea class="input-field" id="ep-address" rows="2">${u.address||''}</textarea></div>
            <div id="ep-error" style="color:red;font-size:.85rem;"></div>
            <div class="action-row" style="margin-top:12px;">
              <button class="btn btn-primary btn-xs" onclick="savePatientProfile()">Save Changes</button>
              <button class="btn btn-secondary btn-xs" onclick="toggleEditMode()">Cancel</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3>Health Summary</h3></div>
          <div class="card-body">
            <div class="info-row"><label>Blood Group</label><span style="font-size:1.2rem;font-weight:700;color:var(--danger);">${u.bloodGroup||'Not set'}</span></div>
            <div class="info-row"><label>Age</label><span>${u.age ? u.age + ' years' : 'Not set'}</span></div>
            <div class="info-row"><label>Gender</label><span>${u.gender||'Not set'}</span></div>
            <div style="margin-top:16px;padding:14px;background:#f0f4f8;border-radius:8px;">
              <p style="font-size:.82rem;color:var(--text2);">Keep your profile updated so doctors have accurate information about you.</p>
            </div>
          </div>
        </div>
      </div>
    `;
  } catch(e) { sec.innerHTML = `<div style="color:red;">${e.message}</div>`; }
}

function toggleEditMode() {
  const view = document.getElementById('profile-view');
  const edit = document.getElementById('profile-edit');
  if (view.style.display === 'none') { view.style.display = 'block'; edit.style.display = 'none'; }
  else { view.style.display = 'none'; edit.style.display = 'block'; }
}

async function savePatientProfile() {
  const errEl = document.getElementById('ep-error');
  errEl.textContent = '';
  try {
    await API.auth.updateMe({
      name: document.getElementById('ep-name').value.trim(),
      phone: document.getElementById('ep-phone').value.trim(),
      age: Number(document.getElementById('ep-age').value) || undefined,
      gender: document.getElementById('ep-gender').value,
      bloodGroup: document.getElementById('ep-blood').value,
      address: document.getElementById('ep-address').value.trim()
    });
    // Update stored user
    const updatedRes = await API.auth.me();
    if (updatedRes.user) {
      const stored = Auth.getUser();
      Auth.setSession(Auth.getToken(), { ...stored, ...updatedRes.user });
    }
    alert('✅ Profile updated successfully!');
    loadProfile();
  } catch(e) { errEl.textContent = e.message; }
}
