<!DOCTYPE html>
<html>
<head>
  <title>Add Patient</title>
</head>
<body>

<h2>Add Patient</h2>

<form id="patientForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="number" id="age" placeholder="Age" required><br><br>
  <input type="text" id="gender" placeholder="Gender" required><br><br>
  <input type="text" id="phone" placeholder="Phone" required><br><br>
  <input type="text" id="disease" placeholder="Disease" required><br><br>
  <input type="text" id="address" placeholder="Address"><br><br>

  <button type="submit">Save Patient</button>
</form>

<script>
document.getElementById("patientForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    gender: document.getElementById("gender").value,
    phone: document.getElementById("phone").value,
    disease: document.getElementById("disease").value,
    address: document.getElementById("address").value
  };

  const res = await fetch("http://localhost:5000/api/patients/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message);
});
</script>

</body>
</html>
